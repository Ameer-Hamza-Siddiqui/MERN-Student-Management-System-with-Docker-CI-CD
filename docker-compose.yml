version: "3.9"
services:
  mongodb:
    image: mongo:7
    container_name: student-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  backend:
    build: ./backend
    container_name: student-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/student_management
    depends_on:
      - mongodb
  frontend:
    build: ./frontend
    container_name: student-frontend
    ports:
      - "3500:3500"
    depends_on:
      - backend
volumes:
  mongo-data:
